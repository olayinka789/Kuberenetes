apiVersion: v1
kind: Pod
metadata:
  name: nginx-pod
  labels:
    app: nginx1
spec:
  containers:
  - name: nginx-container
    image: nginx
    ports:
    - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: nginx-pod-svc
spec:
  selector:
    app: nginx1 # This selector matches the label of the nginx-pod, allowing the service to route traffic to it.
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80

---
apiVersion: v1
kind: Pod
metadata:
  name: nginx-pod2
  labels:
    app: nginx2
spec:
  containers:
  - name: nginx-container
    image: nginx
    ports:
    - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: nginx-pod2-svc
spec:
  selector:
    app: nginx2 # This selector matches the label of the nginx-pod2, allowing the service to route traffic to it.
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80