apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  labels:
    env: demo
    app: nginx
spec:
  # modify replicas according to your case
  replicas: 3
  selector:
    matchLabels:
       env: demo
  template:
    metadata:
      labels:
       env: demo
    spec:
      containers:
      - name: nginx
        image: nginx:1.14.2
