apiVersion: v1
kind: Pod
metadata:
  name: memory-demo
  namespace: mem-example
spec:
  containers:
  - name: memory-demo-ctr
    image: polinux/stress
    resources:
      requests:
        memory: "100Mi" # This is the request for memory, which is the amount of memory that the container is guaranteed to have.
      limits:
        memory: "200Mi" # This is the limit for memory, which is the maximum amount of memory that the container can use.
    command: ["stress"]
    args: ["--vm", "1", "--vm-bytes", "150M", "--vm-hang", "1"]
                                        # This command will cause the container to use 150Mi of memory, which is within the limits specified. The container will run successfully without being terminated by the Kubernetes system due to memory usage.  