apiVersion: v1
kind: Pod
metadata:
  name: dapi-test-pod
spec:
  containers:
    - name: test-container
      image: registry.k8s.io/busybox:1.27.2
      command: [ "/bin/sh", "-c", "env" ]
      envFrom:
      - configMapRef:
          name: special-config # Name of the ConfigMap to reference
  restartPolicy: Never

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: special-config
data:
  FIRSTNAME: Olayinka
  ROLE: DevOps
