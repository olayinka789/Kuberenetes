# ArgoCD Application manifest to deploy nginx-pod.yml
# To apply this: kubectl apply -f argocd-deployment.yml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-pod-deployment
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/olayinka789/Kuberenetes.git'
    targetRevision: HEAD
    # The path was corrected to match your repo structure
    path: Kubernetes/CKA/Kuberenetes
    directory:
      recurse: false
      include: 'nginx-pod.yml'
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
